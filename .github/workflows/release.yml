name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          for PAIR in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${PAIR%%/*}"
            GOARCH="${PAIR##*/}"
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            OUT="dist/lsp-inspector-${GOOS}-${GOARCH}${EXT}"
            echo "Building $OUT"
            GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="-s -w" -o "$OUT" ./cmd/lsp-inspector
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
